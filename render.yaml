services:
  - type: web
    name: victim-advocate
    runtime: docker
    repo: https://github.com/AIIT-GLITCH/victim-advocate
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 5000
    healthCheckPath: /
    autoDeploy: true
